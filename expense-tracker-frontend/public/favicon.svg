<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="32" height="16" rx="7" fill="url(#shine)"/>

  <!-- Wallet body -->
  <rect x="5" y="13" width="20" height="12" rx="2.5" fill="white"/>
  <!-- Wallet top flap -->
  <path d="M7.5 13V11a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2v2z" fill="white" opacity="0.75"/>
  <!-- Coin pocket -->
  <rect x="17.5" y="15.5" width="7.5" height="5.5" rx="1.5" fill="#D1FAE5"/>
  <!-- Coin -->
  <circle cx="21.25" cy="18.25" r="2" fill="#10B981"/>
  <!-- Rupee symbol on coin -->
  <text x="21.25" y="20"
        text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="3.2"
        font-weight="800"
        fill="white">₹</text>
</svg>
