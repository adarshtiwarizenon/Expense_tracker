<div class="not-found-wrapper">
  <div class="content">
    <div class="error-icon">
      <i class="pi pi-exclamation-triangle"></i>
    </div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>

    <div class="actions">
      <p-button
        label="Go Back"
        icon="pi pi-arrow-left"
        [outlined]="true"
        (onClick)="goBack()"
      ></p-button>
      <p-button
        label="Dashboard"
        icon="pi pi-home"
        (onClick)="goHome()"
      ></p-button>
    </div>
  </div>
</div>
