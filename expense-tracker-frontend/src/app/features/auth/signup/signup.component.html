<div class="auth-wrapper">
  <p-card styleClass="auth-card">
    <div class="auth-header">
      <h2>Create Account</h2>
      <p>Start tracking your finances</p>
    </div>

    <p-divider></p-divider>

    <p-message
      *ngIf="serverError"
      severity="error"
      [text]="serverError"
      styleClass="w-full mb-3"
    ></p-message>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="fullName">Full Name</label>
        <input
          pInputText
          id="fullName"
          formControlName="fullName"
          placeholder="John Doe"
          class="w-full"
        />
        <small class="p-error" *ngIf="isInvalid('fullName')">
          Full name is required
        </small>
      </div>

      <div class="field mt-3">
        <label for="email">Email</label>
        <input
          pInputText
          id="email"
          type="email"
          formControlName="email"
          placeholder="your@email.com"
          class="w-full"
        />
        <small class="p-error" *ngIf="isInvalid('email')">
          Please enter a valid email
        </small>
      </div>

      <div class="field mt-3">
        <label for="password">Password</label>
        <p-password
          formControlName="password"
          [toggleMask]="true"
          placeholder="At least 8 characters"
          styleClass="w-full"
          inputStyleClass="w-full"
        ></p-password>
        <small class="p-error" *ngIf="isInvalid('password')">
          Password must be at least 8 characters
        </small>
      </div>

      <div class="field mt-3">
        <label for="confirmPassword">Confirm Password</label>
        <p-password
          formControlName="confirmPassword"
          [feedback]="false"
          [toggleMask]="true"
          placeholder="Re-enter password"
          styleClass="w-full"
          inputStyleClass="w-full"
        ></p-password>
        <small class="p-error" *ngIf="passwordMismatch">
          Passwords do not match
        </small>
      </div>

      <div class="field mt-3">
        <div class="flex align-items-center gap-2">
          <p-checkbox
            formControlName="acceptTerms"
            [binary]="true"
            inputId="acceptTerms"
          ></p-checkbox>
          <label for="acceptTerms" class="mb-0">
            I accept the terms and conditions
          </label>
        </div>
        <small class="p-error block" *ngIf="isInvalid('acceptTerms')">
          You must accept the terms
        </small>
      </div>

      <p-button
        type="submit"
        label="Sign Up"
        icon="pi pi-user-plus"
        styleClass="w-full mt-4"
        [loading]="loading"
      ></p-button>

      <p-divider align="center">
        <span class="text-sm">OR</span>
      </p-divider>

      <div class="text-center">
        <span>Already have an account? </span>
        <a routerLink="/auth/login">Sign In</a>
      </div>
    </form>
  </p-card>
</div>
