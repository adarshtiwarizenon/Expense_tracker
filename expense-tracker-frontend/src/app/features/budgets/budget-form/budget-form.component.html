<p-dialog
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [header]="editingBudget ? 'Edit Budget' : 'New Budget'"
  [modal]="true"
  [style]="{ width: '450px' }"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <p-message
      *ngIf="serverError"
      severity="error"
      [text]="serverError"
      styleClass="w-full mb-3"
    ></p-message>

    <div class="field">
      <label for="categoryId">Category *</label>
      <p-select
        formControlName="categoryId"
        [options]="expenseCategories"
        optionLabel="name"
        optionValue="id"
        placeholder="Select an expense category"
        styleClass="w-full"
        appendTo="body"
      ></p-select>
      <p-message
        *ngIf="isInvalid('categoryId')"
        severity="error"
        text="Category is required"
        styleClass="mt-1"
      ></p-message>
    </div>

    <div class="field mt-3">
      <label for="amount">Budget Amount *</label>
      <p-inputNumber
        formControlName="amount"
        mode="currency"
        currency="INR"
        locale="en-IN"
        placeholder="Enter amount"
        styleClass="w-full"
        inputStyleClass="w-full"
      ></p-inputNumber>
      <p-message
        *ngIf="isInvalid('amount')"
        severity="error"
        text="Amount must be greater than 0"
        styleClass="mt-1"
      ></p-message>
    </div>

    <div class="field mt-3">
      <label for="monthDate">Month *</label>
      <p-datepicker
        formControlName="monthDate"
        view="month"
        dateFormat="MM yy"
        [showIcon]="true"
        styleClass="w-full"
        appendTo="body"
      ></p-datepicker>
    </div>

    <p-divider></p-divider>

    <div class="flex justify-content-end gap-2">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        [text]="true"
        (onClick)="onCancel()"
      ></p-button>
      <p-button
        type="submit"
        label="Save"
        icon="pi pi-check"
      ></p-button>
    </div>
  </form>
</p-dialog>
