<app-page-toolbar title="Categories">
  <p-splitButton
    label="Add Category"
    icon="pi pi-plus"
    (onClick)="openCreateDialog()"
    [model]="splitMenuItems"
  ></p-splitButton>
</app-page-toolbar>

<p-panel header="Manage your categories" [toggleable]="true">
  <p-table
    [value]="(categories$ | async) || []"
    [(selection)]="selectedCategories"
    [loading]="loading"
    [paginator]="true"
    [rows]="defaultPageSize"
    [rowsPerPageOptions]="pageSizeOptions"
    styleClass="p-datatable-sm"
    dataKey="id"
  >
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 40px">
          <p-tableHeaderCheckbox></p-tableHeaderCheckbox>
        </th>
        <th>Name</th>
        <th>Type</th>
        <th style="width: 150px">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-category>
      <tr>
        <td>
          <p-tableCheckbox [value]="category"></p-tableCheckbox>
        </td>
        <td>{{ category.name }}</td>
        <td>
          <p-tag
            [value]="category.type"
            [severity]="category.type | severity"
          ></p-tag>
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [text]="true"
            [rounded]="true"
            (onClick)="openEditDialog(category)"
            pTooltip="Edit"
            tooltipPosition="top"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            [text]="true"
            [rounded]="true"
            severity="danger"
            appConfirm
            [confirmMessage]="'Delete category &quot;' + category.name + '&quot;?'"
            confirmHeader="Confirm Delete"
            (confirmed)="deleteOptimistic(category)"
            pTooltip="Delete"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="loadingbody">
      <tr *ngFor="let i of [1, 2, 3, 4, 5]">
        <td><p-skeleton width="20px"></p-skeleton></td>
        <td><p-skeleton></p-skeleton></td>
        <td><p-skeleton width="80px"></p-skeleton></td>
        <td><p-skeleton></p-skeleton></td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center p-4">No categories found</td>
      </tr>
    </ng-template>
  </p-table>
</p-panel>

<p-dialog
  [(visible)]="dialogVisible"
  [header]="editingCategory ? 'Edit Category' : 'New Category'"
  [modal]="true"
  [style]="{ width: '400px' }"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <p-message
      *ngIf="serverError"
      severity="error"
      [text]="serverError"
      styleClass="w-full mb-3"
    />

    <div class="field">
      <label for="name">Name</label>
      <input
        pInputText
        id="name"
        formControlName="name"
        class="w-full"
        placeholder="e.g. Groceries"
      />
      <p-message
        *ngIf="isInvalid('name') && form.get('name')?.errors?.['required']"
        severity="error"
        text="Name is required"
        styleClass="w-full mt-1"
      />
      <p-message
        *ngIf="isInvalid('name') && form.get('name')?.errors?.['minlength']"
        severity="error"
        text="Name must be at least 2 characters"
        styleClass="w-full mt-1"
      />
    </div>

    <div class="field mt-3">
      <label for="type">Type</label>
      <p-select
        formControlName="type"
        [options]="typeOptions"
        placeholder="Select type"
        styleClass="w-full"
      ></p-select>
      <p-message
        *ngIf="isInvalid('type')"
        severity="error"
        text="Type is required"
        styleClass="w-full mt-1"
      />
    </div>

    <p-divider></p-divider>

    <div class="flex justify-content-end gap-2">
      <p-button
        label="Cancel"
        icon="pi pi-times"
        [text]="true"
        (onClick)="dialogVisible = false"
      ></p-button>
      <p-button
        type="submit"
        label="Save"
        icon="pi pi-check"
      ></p-button>
    </div>
  </form>
</p-dialog>
