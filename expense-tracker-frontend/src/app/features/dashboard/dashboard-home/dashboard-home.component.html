<app-page-toolbar title="Dashboard">
  <p-button
    icon="pi pi-refresh"
    [text]="true"
    [rounded]="true"
    (onClick)="loadSummary()"
    pTooltip="Refresh"
    tooltipPosition="left"
  ></p-button>
</app-page-toolbar>

<ng-container *ngIf="{ summary: summary$ | async } as vm">
<div class="dashboard-container">
  <!-- SUMMARY CARDS -->
  <div class="grid mb-4">
    <div class="col-12 md:col-6 lg:col-3">
      <app-summary-card
        label="Total Income"
        icon="pi pi-arrow-down"
        variant="income"
        [value]="vm.summary?.totalIncome"
        [loading]="loading"
      />
    </div>

    <div class="col-12 md:col-6 lg:col-3">
      <app-summary-card
        label="Total Expenses"
        icon="pi pi-arrow-up"
        variant="expense"
        [value]="vm.summary?.totalExpenses"
        [loading]="loading"
      />
    </div>

    <div class="col-12 md:col-6 lg:col-3">
      <app-summary-card
        label="Current Balance"
        icon="pi pi-wallet"
        variant="balance"
        [value]="vm.summary?.currentBalance"
        [loading]="loading"
      />
    </div>

    <div class="col-12 md:col-6 lg:col-3">
      <app-summary-card
        label="Monthly Savings"
        icon="pi pi-chart-line"
        variant="savings"
        [value]="vm.summary?.monthlySavings"
        [loading]="loading"
      />
    </div>
  </div>

  <div class="grid">
    <!-- RECENT TRANSACTIONS -->
    <div class="col-12 lg:col-7">
      <p-card>
        <ng-template pTemplate="header">
          <div class="card-header">
            <h3 class="m-0">Recent Transactions</h3>
            <a routerLink="/transactions" class="view-all">
              View All <i class="pi pi-arrow-right"></i>
            </a>
          </div>
        </ng-template>

        <p-table
          [value]="vm.summary?.recentTransactions || []"
          [loading]="loading"
          styleClass="p-datatable-sm"
          dataKey="id"
        >
          <ng-template pTemplate="header">
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th>Type</th>
              <th>Amount</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-tx>
            <tr>
              <td>{{ tx.date | date: 'dd MMM' }}</td>
              <td>{{ tx.categoryName }}</td>
              <td>
                <p-tag
                  [value]="tx.type"
                  [severity]="tx.type | severity"
                ></p-tag>
              </td>
              <td>{{ tx.amount | inr: false }}</td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="4" class="text-center p-3">
                <p-message
                  severity="info"
                  text="No transactions yet. Start by adding your first one!"
                  styleClass="w-full"
                ></p-message>
              </td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

    <!-- BUDGET ALERTS -->
    <div class="col-12 lg:col-5">
      <p-card>
        <ng-template pTemplate="header">
          <div class="card-header">
            <h3 class="m-0">Budget Alerts</h3>
            <a routerLink="/budgets" class="view-all">
              Manage <i class="pi pi-arrow-right"></i>
            </a>
          </div>
        </ng-template>

        <div *ngIf="loading">
          <p-skeleton height="60px" styleClass="mb-2"></p-skeleton>
          <p-skeleton height="60px" styleClass="mb-2"></p-skeleton>
        </div>

        <div *ngIf="!loading">
          <div
            *ngIf="(vm.summary?.budgetAlerts?.length ?? 0) === 0"
            class="text-center p-3"
          >
            <p-message
              severity="success"
              text="All budgets are within healthy limits!"
              styleClass="w-full"
            ></p-message>
          </div>

          <div
            *ngFor="let alert of vm.summary?.budgetAlerts; trackBy: trackByBudgetId"
            class="alert-item"
          >
            <div class="flex justify-content-between align-items-center mb-2">
              <span class="alert-category">{{ alert.categoryName }}</span>
              <p-tag
                [value]="alert.status"
                [severity]="alert.status | severity: 'status'"
              ></p-tag>
            </div>
            <p-progressBar
              [value]="alert.utilizationPercentage"
              [showValue]="false"
              [style]="{ height: '8px' }"
            ></p-progressBar>
            <div class="flex justify-content-between mt-2 alert-amounts">
              <span>
                {{ alert.spentAmount | inr }}
                / {{ alert.budgetAmount | inr }}
              </span>
              <span class="font-bold">
                {{ alert.utilizationPercentage }}%
              </span>
            </div>
            <p-divider></p-divider>
          </div>
        </div>
      </p-card>
    </div>
  </div>
</div>
</ng-container>
