<app-page-toolbar title="Recurring Transactions">
  <div class="flex gap-2">
    <p-button
      label="Trigger Now"
      icon="pi pi-bolt"
      severity="secondary"
      (onClick)="triggerNow()"
      [loading]="triggering"
      pTooltip="Process all due recurring transactions"
      tooltipPosition="bottom"
    ></p-button>
    <p-button
      label="Add Recurring"
      icon="pi pi-plus"
      (onClick)="openCreateDialog()"
    ></p-button>
  </div>
</app-page-toolbar>

<p-panel header="Active Recurring Transactions" [toggleable]="true">
  <ng-container *ngIf="recurring$ | async as recurringTransactions">
  <p-table
    [value]="recurringTransactions"
    [loading]="loading"
    [paginator]="recurringTransactions.length > 0"
    [rows]="defaultPageSize"
    [rowsPerPageOptions]="pageSizeOptions"
    styleClass="p-datatable-sm"
    dataKey="id"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Category</th>
        <th>Type</th>
        <th>Amount</th>
        <th>Frequency</th>
        <th>Next Execution</th>
        <th>Description</th>
        <th style="width: 130px">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-recurring>
      <tr>
        <td>{{ recurring.categoryName }}</td>
        <td>
          <p-tag
            [value]="recurring.type"
            [severity]="recurring.type | severity"
          ></p-tag>
        </td>
        <td>{{ recurring.amount | inr }}</td>
        <td>
          <p-tag
            [value]="recurring.frequency"
            [severity]="recurring.frequency | severity: 'frequency'"
          ></p-tag>
        </td>
        <td>{{ recurring.nextExecution | date: 'dd MMM yyyy' }}</td>
        <td>{{ recurring.description || '-' }}</td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [text]="true"
            [rounded]="true"
            (onClick)="openEditDialog(recurring)"
            pTooltip="Edit"
            tooltipPosition="top"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            [text]="true"
            [rounded]="true"
            severity="danger"
            appConfirm
            [confirmMessage]="'Delete recurring transaction for &quot;' + recurring.categoryName + '&quot;?'"
            confirmHeader="Confirm Delete"
            (confirmed)="deleteOptimistic(recurring)"
            pTooltip="Delete"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="loadingbody">
      <tr *ngFor="let i of [1, 2, 3]">
        <td><p-skeleton></p-skeleton></td>
        <td><p-skeleton width="80px"></p-skeleton></td>
        <td><p-skeleton></p-skeleton></td>
        <td><p-skeleton width="80px"></p-skeleton></td>
        <td><p-skeleton></p-skeleton></td>
        <td><p-skeleton></p-skeleton></td>
        <td><p-skeleton></p-skeleton></td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="7"></td>
      </tr>
    </ng-template>
  </p-table>

  @if (!loading && recurringTransactions.length === 0) {
    <p-message
      severity="info"
      styleClass="w-full mt-3"
      text="No recurring transactions set up yet. Add one to automate your repeated payments!"
    ></p-message>
  }
  </ng-container>
</p-panel>

<app-recurring-form
  [(visible)]="dialogVisible"
  [editingRecurring]="editingRecurring"
  [categories]="categories"
  [serverError]="recurringServerError"
  (save)="onSave($event)"
></app-recurring-form>
