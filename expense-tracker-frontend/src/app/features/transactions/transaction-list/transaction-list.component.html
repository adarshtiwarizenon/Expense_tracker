<app-page-toolbar title="Transactions">
  <p-splitButton
    label="Add Transaction"
    icon="pi pi-plus"
    (onClick)="openCreateDialog()"
    [model]="splitMenuItems"
  ></p-splitButton>
</app-page-toolbar>

<!-- Filters Panel -->
<p-panel header="Filters" [toggleable]="true" styleClass="mb-3">
  <div class="grid">
    <div class="col-12 md:col-3">
      <label class="block mb-2">Type</label>
      <p-select
        [(ngModel)]="filterType"
        [options]="typeOptions"
        placeholder="All types"
        styleClass="w-full"
      ></p-select>
    </div>
    <div class="col-12 md:col-3">
      <label class="block mb-2">Categories</label>
      <p-multiSelect
        [(ngModel)]="filterCategoryIds"
        [options]="(categories$ | async) || []"
        optionLabel="name"
        optionValue="id"
        placeholder="All categories"
        styleClass="w-full"
        display="chip"
      ></p-multiSelect>
    </div>
    <div class="col-12 md:col-4">
      <label class="block mb-2">Date Range</label>
      <p-datepicker
        [(ngModel)]="filterDateRange"
        selectionMode="range"
        [readonlyInput]="true"
        placeholder="Select range"
        dateFormat="dd-mm-yy"
        [showIcon]="true"
        [maxDate]="today"
        styleClass="w-full"
      ></p-datepicker>
    </div>
    <div class="col-12 md:col-2 flex align-items-end gap-2">
      <p-button
        label="Apply"
        icon="pi pi-filter"
        (onClick)="applyFilters()"
        pTooltip="Apply filters"
      ></p-button>
      <p-button
        icon="pi pi-times"
        [text]="true"
        (onClick)="clearFilters()"
        pTooltip="Clear filters"
      ></p-button>
    </div>
  </div>
</p-panel>

<!-- Table -->
<!-- pageStream$ async binding keeps the refresh pipeline subscribed; data is read from page$ -->
<ng-container *ngIf="{ stream: pageStream$ | async, page: page$ | async } as vm">
<p-table
  [value]="vm.page?.content || []"
  [lazy]="true"
  (onLazyLoad)="loadTransactions($event)"
  [paginator]="true"
  [rows]="defaultPageSize"
  [totalRecords]="totalRecords"
  [loading]="loading"
  [rowsPerPageOptions]="pageSizeOptions"
  styleClass="p-datatable-sm"
  sortField="date"
  [sortOrder]="-1"
  dataKey="id"
>
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="date">Date <p-sortIcon field="date"></p-sortIcon></th>
      <th>Type</th>
      <th>Category</th>
      <th pSortableColumn="amount">Amount <p-sortIcon field="amount"></p-sortIcon></th>
      <th>Description</th>
      <th>Method</th>
      <th style="width: 130px">Actions</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-tx>
    <tr>
      <td>{{ tx.date | date: 'dd MMM yyyy' }}</td>
      <td>
        <p-tag [value]="tx.type" [severity]="tx.type | severity"></p-tag>
      </td>
      <td>{{ tx.categoryName }}</td>
      <td>{{ tx.amount | inr }}</td>
      <td>{{ tx.description || '-' }}</td>
      <td>{{ tx.paymentMethod || '-' }}</td>
      <td>
        <p-button
          icon="pi pi-pencil"
          [text]="true"
          [rounded]="true"
          (onClick)="openEditDialog(tx)"
          pTooltip="Edit"
          tooltipPosition="top"
        ></p-button>
        <p-button
          icon="pi pi-trash"
          [text]="true"
          [rounded]="true"
          severity="danger"
          appConfirm
          confirmMessage="Delete this transaction?"
          confirmHeader="Confirm Delete"
          (confirmed)="deleteOptimistic(tx)"
          pTooltip="Delete"
          tooltipPosition="top"
        ></p-button>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="loadingbody">
  <tr *ngFor="let i of [1, 2, 3, 4, 5]">
    <td><p-skeleton></p-skeleton></td>
    <td><p-skeleton width="60px"></p-skeleton></td>
    <td><p-skeleton></p-skeleton></td>
    <td><p-skeleton></p-skeleton></td>
    <td><p-skeleton></p-skeleton></td>
    <td><p-skeleton></p-skeleton></td>
    <td><p-skeleton></p-skeleton></td>
  </tr>
</ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="7" class="text-center p-4">No transactions found</td>
    </tr>
  </ng-template>
</p-table>
</ng-container>

<app-transaction-form
  [(visible)]="dialogVisible"
  [editingTransaction]="editingTransaction"
  [categories]="(categories$ | async) || []"
  [serverError]="transactionServerError"
  (save)="onSave($event)"
></app-transaction-form>
